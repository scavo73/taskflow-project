<!doctype html>
<html lang="es" class="min-h-screen transition-colors duration-300">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>TaskFlow – Tailwind + Neumorfismo</title>

  <script>
    (() => {
      const storedTheme = localStorage.getItem('taskflow-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const nextTheme = storedTheme === 'light' || storedTheme === 'dark'
        ? storedTheme
        : (prefersDark ? 'dark' : 'light');

      document.documentElement.classList.toggle('dark', nextTheme === 'dark');
      document.documentElement.dataset.theme = nextTheme;
      document.documentElement.style.colorScheme = nextTheme;
    })();
  </script>

  <link rel="stylesheet" href="./dist/styles.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="min-h-screen transition-colors duration-300">
  <header class="topbar" aria-label="Encabezado principal">
    <div class="topbar__inner mx-auto">
      <div class="topbar__left">
        <a class="brand" href="#" aria-label="TaskFlow">
          <span class="brand__logo">TaskFlow</span>
        </a>

        <nav class="nav" aria-label="Estado de tareas">
          <a class="nav__link is-active" href="#" data-status-nav data-status-value="all" aria-current="page">
            <span class="nav__text">Tareas</span>
            <span class="count-pill task-count"></span>
          </a>

          <a class="nav__link" href="#" data-status-nav data-status-value="pending">
            <span class="nav__text">Pendientes</span>
            <span class="count-pill task-count-pending"></span>
          </a>

          <a class="nav__link" href="#" data-status-nav data-status-value="done">
            <span class="nav__text">Completadas</span>
            <span class="count-pill task-count-done"></span>
          </a>
        </nav>
      </div>

      <div class="topbar__right flex items-center gap-3" aria-label="Acciones">
        <button type="button" class="chip theme-switch" id="btnThemeToggle" data-theme-toggle aria-pressed="true"
          aria-label="Cambiar a tema claro">
          <span class="theme-switch__track" aria-hidden="true">
            <span class="theme-switch__thumb"></span>
          </span>
        </button>
      </div>
    </div>
  </header>

  <main class="app mx-auto ">
    <aside class="sidebar" aria-label="Panel lateral">


      <div class="filter-panel">
        <div class="sec-head panel__head">
          <span class="sec-head__icon" aria-hidden="true">
            <i data-lucide="list-filter"></i>
          </span>
          <h2 class="sec-head__title-desktop panel__title">Filtros</h2>
        </div>

        <section class="filter-group" aria-label="Filtro por prioridad">
          <h3 class="filter-group__title">Prioridad</h3>

          <div class="choice-list" aria-label="Prioridad">
            <label class="choice filter-bg">
              <input type="checkbox" name="priority" value="high" />
              <span class="choice__mark" aria-hidden="true"></span>
              <span class="choice__text">Alta</span>
            </label>

            <label class="choice filter-bg">
              <input type="checkbox" name="priority" value="med" />
              <span class="choice__mark" aria-hidden="true"></span>
              <span class="choice__text">Media</span>
            </label>

            <label class="choice filter-bg">
              <input type="checkbox" name="priority" value="low" />
              <span class="choice__mark" aria-hidden="true"></span>
              <span class="choice__text">Baja</span>
            </label>
          </div>
        </section>

        <section class="filter-group" aria-label="Filtro por categoría">
          <div class="filter-group__head">
            <h3 class="filter-group__title">Categoría</h3>
          </div>

          <div class="category-panel">
            <div class="choice-list choice-list--categories" id="categoryFiltersGroup" aria-label="Categoría"></div>
          </div>
        </section>

        <button type="button" id="btnClearFilters" class="btn btn--primary btn--clear ml-auto" hidden>
          Limpiar filtros
        </button>
      </div>
    </aside>

    <section class="tasks" aria-label="Tareas">

      <div class="task-actions" aria-label="Acciones de tareas">
        <div class="section-search">
          <label class="search" aria-label="Buscar tareas">
            <i data-lucide="search" aria-hidden="true"></i>
            <input type="search" id="taskSearch" class="search__input" placeholder="Buscar tareas"
              aria-label="Buscar tareas" />
          </label>
        </div>

        <button type="button" class="chip action-btn" id="btnToggleLayout" aria-pressed="false">
          <i data-lucide="rows-3" aria-hidden="true"></i>
          <span>Vista lista</span>
        </button>

        <button type="button" class="chip action-btn" id="btnCompleteAllTasks">
          <i data-lucide="check-check" aria-hidden="true"></i>
          <span>Completar todas</span>
        </button>

        <button type="button" class="chip action-btn action-btn--danger" id="btnDeleteAllTasks">
          <i data-lucide="trash-2" aria-hidden="true"></i>
          <span>Borrar todas</span>
        </button>
      </div>

      <form class="task-form" aria-label="Añadir tarea">
        <div class="box box--pad">
          <div class="form-flex">
            <div class="field field--title">
              <div class="sec-head">
                <span class="sec-head__icon" aria-hidden="true">
                  <i data-lucide="sticky-note"></i>
                </span>
                <h2 class="sec-head__title-desktop">Crear tarea nueva</h2>
              </div>
              <input class="input" id="taskTitle" type="text" placeholder="Ej: Enviar propuesta" />
            </div>

            <div class="form-row">
              <div class="field field--category">
                <div class="field__head">
                  <label class="label" for="taskCategory">Categoría</label>

                  <button type="button" class="category-field__trigger category-field__trigger--inline"
                    id="btnNewCategory" aria-expanded="false" aria-controls="newCategoryEditor">
                    Añadir
                  </button>
                </div>

                <div class="category-field" id="desktopCategoryField">
                  <div class="category-field__row" id="desktopCategorySelectRow">
                    <select class="select category-field__select" id="taskCategory"></select>
                  </div>

                  <div class="category-field__edit" id="newCategoryEditor" hidden>
                    <input class="input category-field__input" id="newCategoryInput" type="text"
                      placeholder="Nombre de categoría" />

                    <div class="category-field__actions">
                      <button type="button" class="chip category-action category-action--save" id="btnSaveNewCategory">
                        <i data-lucide="check" aria-hidden="true"></i>
                      </button>

                      <button type="button" class="chip category-action" id="btnCancelNewCategory">
                        <i data-lucide="x" aria-hidden="true"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="field field--priority">
                <label class="label" for="taskPriority">Prioridad</label>
                <select class="select" id="taskPriority">
                  <option>Alta</option>
                  <option selected>Media</option>
                  <option>Baja</option>
                </select>
              </div>

              <div class="form-actions">
                <button class="btn btn--primary" type="submit">Añadir tarea</button>
              </div>
            </div>
          </div>
        </div>
      </form>



      <div class="active-filters">
        <ul id="selectedFiltersList"></ul>
      </div>



      <div class="task-grid" aria-label="Tarjetas de tareas">
        <ul class="task-list" aria-label="Lista de tareas" id="taskList"></ul>
      </div>

      <div class="stats">
        <div class="sec-head">
          <span class="sec-head__icon" aria-hidden="true">
            <i data-lucide="pickaxe"></i>
          </span>
          <h2 class="sec-head__title-desktop">
            Progreso:
            <span class="stats__done">0</span>
            de
            <span class="task-count">0</span>
            completadas
          </h2>
        </div>

        <div class="stats__bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="stats__fill" style="width: 0%"></div>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Estado de tareas">
    <div class="bottom-nav__inner">
      <a class="bottom-nav__link is-active" href="#" data-status-nav data-status-value="all" aria-current="page">
        <span class="bottom-nav__text">Tareas</span>
        <span class="count-pill task-count"></span>
      </a>

      <a class="bottom-nav__link" href="#" data-status-nav data-status-value="pending">
        <span class="bottom-nav__text">Pendientes</span>
        <span class="count-pill task-count-pending"></span>
      </a>

      <a class="bottom-nav__link" href="#" data-status-nav data-status-value="done">
        <span class="bottom-nav__text">Completadas</span>
        <span class="count-pill task-count-done"></span>
      </a>
    </div>
  </nav>

  <script src="./js/theme.js"></script>
  <script src="./js/filters-drawer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.7/Sortable.min.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/mobile-task-form.js"></script>
  <script src="https://unpkg.com/lucide@0.576.0/dist/umd/lucide.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    });
  </script>
</body>

</html>

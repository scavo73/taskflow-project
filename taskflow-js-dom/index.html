<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskFlow – Maqueta</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="contenedor" aria-label="Encabezado principal">
        <div class="contenedor__encabezado">
            <div class="contendor__encabezado-izquierdo">
                <div class="marca">
                    <span class="marca__logo">TaskFlow</span>
                </div>
                <nav class="navegacion" aria-label="Navegación principal">
                    <a class="navegacion__enlace is-activo" href="#">Inbox</a>
                    <a class="navegacion__enlace" href="#">Highlights</a>
                </nav>
            </div>
            <div class="contenedor__encabezado-derecho" aria-label="Acciones">
                <span class="avatar-iniciales" aria-label="Usuario">OJ</span>
            </div>
        </div>
    </header>

    <main class="principal-layout">
        <aside class="barra-lateral" aria-label="Filtros">
            <div class="contenedor-vidrio panel">
                <h2 class="panel__titulo">Filtros</h2>
                <section class="filtros" aria-label="Filtro por prioridad">
                    <h3 class="filtros__titulo">Prioridad</h3>
                    <div class="filtros__grupo" role="radiogroup" aria-label="Prioridad">
                        <label class="opcion">
                            <input type="radio" name="prioridad" value="all" checked />
                            <span class="badge">Todas</span>
                        </label>

                        <label class="opcion">
                            <input type="radio" name="prioridad" value="high" />
                            <span class="badge">Alta</span>
                        </label>

                        <label class="opcion">
                            <input type="radio" name="prioridad" value="med" />
                            <span class="badge">Media</span>
                        </label>

                        <label class="opcion">
                            <input type="radio" name="prioridad" value="low" />
                            <span class="badge">Baja</span>
                        </label>
                    </div>
                </section>

                <section class="filtros" aria-label="Filtro por categoría">
                    <h3 class="filtros__titulo">Categoría</h3>

                    <div class="filtros__grupo" aria-label="Categoría">
                        <label class="opcion">
                            <input type="checkbox" name="cat" value="trabajo" />
                            <span class="badge">Trabajo</span>
                        </label>

                        <label class="opcion">
                            <input type="checkbox" name="cat" value="estudio" />
                            <span class="badge">Estudio</span>
                        </label>

                        <label class="opcion">
                            <input type="checkbox" name="cat" value="personal" />
                            <span class="badge">Personal</span>
                        </label>

                        <label class="opcion">
                            <input type="checkbox" name="cat" value="salud" />
                            <span class="badge">Salud</span>
                        </label>
                    </div>
                </section>
            </div>
        </aside>

        <section class="seccion-tareas contenedor-vidrio" aria-label="Tareas">
            <div class="cabecera-seccion">
                <h1 class="cabecera-seccion__titulo">Tareas</h1>
                <span class="badge contador-tareas"></span>
            </div>
            <div class="progreso" aria-label="Progreso de tareas">
                <div class="progreso__fila">
                    <div class="progreso__texto">
                        <span class="progreso__titulo">Progreso</span>
                        <span class="progreso__hechos">0</span>
                        de
                        <span class="contador-tareas">0</span>
                        completadas
                    </div>
                </div>
                <div class="progreso__barra" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                    aria-valuenow="25">
                    <div class="progreso__relleno" style="width: 0%"></div>
                </div>

                <div class="filtros__elegidos">
                    <ul id="listaFiltrosElegidos">
                        <li class="filtro__elegido-item">
                        </li>
                    </ul>
                </div>
            </div>



            <div class="grid-tareas" aria-label="Tarjetas de tareas">
                <form class="tarea tarea-nueva" aria-label="Añadir tarea">
                    <div class="form">
                        <div class="form-campo">
                            <label class="form-campo__etiqueta" for="tituloTarea">Título</label>
                            <input class="form-campo__control" id="tituloTarea" type="text"
                                placeholder="Ej: Enviar propuesta" />
                        </div>
                        <div class="form-fila-formulario">
                            <div class="form-campo">
                                <label class="form-campo__etiqueta" for="categoria-tarea">Categoría</label>
                                <select class="form-campo__control" id="categoria-tarea">
                                    <option>Trabajo</option>
                                    <option>Estudio</option>
                                    <option>Personal</option>
                                    <option>Salud</option>
                                </select>

                            </div>
                            <div class="form-campo">
                                <label class="form-campo__etiqueta" for="prioridad-tarea">Prioridad</label>
                                <select class="form-campo__control" id="prioridad-tarea">
                                    <option>Alta</option>
                                    <option selected>Media</option>
                                    <option>Baja</option>
                                </select>
                            </div>
                        </div>
                        <button class="btn" onclick="addTask()" type="button">

                            <strong>Añadir Tarea</strong>
                            <div id="container-stars">
                                <div id="stars"></div>
                            </div>
                            <div id="glow">
                                <div class="circle"></div>
                                <div class="circle"></div>
                            </div>
                        </button>
                    </div>
                </form>

                <ul class="lista-tareas" aria-label="Lista de tareas" id="listContainer">
                    <!-- <li class="lista-tareas__item">
                        <div class="tarea-item">
                            <input class="tarea-item__toggle" type="checkbox" id="1" />
                            <label class="tarea tarea--content" for="1">
                                <div class="tarea__up">
                                    <div class="tarea__check">
                                        <span class="tarea__cuadro" aria-hidden="true">
                                            <i data-lucide="check"></i>
                                        </span>
                                        <span class="tarea__titulo">Preparar presentación del sprint</span>
                                    </div>
                                    <span class="badge-prioridad badge-prioridad--alta">Alta</span>
                                </div>
                                <div class="tarea__down">
                                    <div class="tarea__categorias">
                                        <span class="tarea__categoria">Trabajo</span>
                                    </div>
                                    <button class="badge tarea__borrar" type="button">
                                        <i data-lucide="trash-2" aria-hidden="true"></i>
                                    </button>
                                </div>
                            </label>
                        </div>
                    </li> -->
                </ul>
            </div>
        </section>
    </main>

    <nav class="tabbar" aria-label="Navegación inferior">
        <div class="tabbar__contenedor">
            <a class="navegacion__enlace is-activo" href="#">Inbox</a>
            <a class="navegacion__enlace" href="#">Highlights</a>
        </div>
    </nav>
</body>

<script src="filtrosDrawer.js"></script>
<script src="app.js"></script>

<script src="https://unpkg.com/lucide@0.576.0/dist/umd/lucide.js" defer></script>
<script defer>
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
</script>

</html>
